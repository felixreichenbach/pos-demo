services:
  mongo:
    image: mongo:7.0
    container_name: pos-demo-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  alloy:
    image: grafana/alloy:latest
    container_name: pos-demo-alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy
    environment:
      GRAFANA_CLOUD_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT}
      GRAFANA_CLOUD_INSTANCE_ID: ${GRAFANA_CLOUD_INSTANCE_ID}
      GRAFANA_CLOUD_API_TOKEN: ${GRAFANA_CLOUD_API_TOKEN}
      GCLOUD_FM_URL: ${GCLOUD_FM_URL}
      GCLOUD_FM_POLL_FREQUENCY: ${GCLOUD_FM_POLL_FREQUENCY}
      GCLOUD_FM_HOSTED_ID: ${GCLOUD_FM_HOSTED_ID}
      GCLOUD_RW_API_KEY: ${GCLOUD_RW_API_KEY}
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./alloy/config.alloy:/etc/alloy:ro
      - pos_logs:/var/log/pos:ro

  pos-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-demo-app
    depends_on:
      - mongo
      - alloy
    environment:
      APP_PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/pos_demo
      MONGODB_COLLECTION: transaction_logs
      TRANSACTION_LOG_FILE: /var/log/pos/transactions.log
      OTEL_SERVICE_NAME: pos-demo-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
      OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED: "true"
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=pos-demo,deployment.environment=${DEPLOYMENT_ENV:-dev},service.version=${SERVICE_VERSION:-0.0.1}
    ports:
      - "8080:8080"
    volumes:
      - pos_logs:/var/log/pos

  load-generator:
    build:
      context: .
      dockerfile: tools/load-generator/Dockerfile
    container_name: pos-demo-load-generator
    depends_on:
      - pos-app
    command:
      - "--url"
      - "http://pos-app:8080/api/transactions"
      - "--min-tpm"
      - "10"
      - "--max-tpm"
      - "120"
    profiles:
      - load

volumes:
  mongo_data:
  pos_logs:
